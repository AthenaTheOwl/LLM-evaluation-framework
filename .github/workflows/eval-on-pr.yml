name: LLM Eval Suite

on:
  pull_request:
    paths:
      - 'src/**'
      - 'eval_suites/**'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Eval suite to run (directory name or "all")'
        required: false
        default: 'all'
      stage:
        description: 'Stage to run: all, deterministic, persona, judge'
        required: false
        default: 'all'

permissions:
  contents: read
  pull-requests: write

jobs:
  deterministic-gate:
    name: "Stage 1: Deterministic Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run deterministic evals
        run: |
          set -euo pipefail
          shopt -s nullglob

          suite_input="${SUITE_INPUT}"
          if [ "${suite_input}" = "all" ]; then
            suites=(eval_suites/*)
          else
            suites=("eval_suites/${suite_input}")
          fi

          mkdir -p ./eval-results

          for suite in "${suites[@]}"; do
            if [ ! -d "${suite}" ]; then
              echo "Suite not found: ${suite}"
              exit 1
            fi

            suite_name="$(basename "${suite}")"
            llm-evals run "${suite}" \
              --stage deterministic \
              --output json \
              --output-dir "./eval-results/${suite_name}" \
              --compare-baseline \
              --fail-on-regression
          done
        env:
          SUITE_INPUT: ${{ github.event.inputs.suite || 'all' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload deterministic results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-results
          path: ./eval-results/

  full-eval:
    name: "Full Eval Pipeline"
    needs: deterministic-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full eval pipeline
        run: |
          set -euo pipefail
          shopt -s nullglob

          suite_input="${SUITE_INPUT}"
          stage_input="${STAGE_INPUT}"
          if [ "${suite_input}" = "all" ]; then
            suites=(eval_suites/*)
          else
            suites=("eval_suites/${suite_input}")
          fi

          mkdir -p ./eval-results

          for suite in "${suites[@]}"; do
            if [ ! -d "${suite}" ]; then
              echo "Suite not found: ${suite}"
              exit 1
            fi

            suite_name="$(basename "${suite}")"
            llm-evals run "${suite}" \
              --stage "${stage_input}" \
              --output all \
              --output-dir "./eval-results/${suite_name}" \
              --compare-baseline \
              --fail-on-regression
          done
        env:
          SUITE_INPUT: ${{ github.event.inputs.suite || 'all' }}
          STAGE_INPUT: ${{ github.event.inputs.stage || 'all' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: ./eval-results/

      - name: Post results to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            let body = '## LLM Eval Results\n\n';

            try {
              const resultsFiles = fs
                .readdirSync('./eval-results', { withFileTypes: true })
                .filter((entry) => entry.isDirectory())
                .map((entry) => path.join('./eval-results', entry.name, 'results.json'))
                .filter((resultPath) => fs.existsSync(resultPath));

              if (resultsFiles.length === 0) {
                throw new Error('No suite results found');
              }

              const formatScore = (stage, score) => {
                if (stage === 'deterministic') {
                  return `${(score * 100).toFixed(1)}%`;
                }
                if (stage === 'persona' || stage === 'judge') {
                  return `${score.toFixed(2)}/5`;
                }
                return score.toFixed(3);
              };

              body += '| Suite | Deterministic | Persona | Judge | Pass rate | Status |\n';
              body += '|-------|---------------|---------|-------|-----------|--------|\n';

              for (const resultPath of resultsFiles) {
                const results = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
                const stageCell = (stage) => {
                  const score = results.aggregate_scores?.[stage];
                  if (score === undefined) {
                    return '—';
                  }
                  const icon = results.stage_passed?.[stage] ? '✅' : '❌';
                  return `${formatScore(stage, score)} ${icon}`;
                };

                const overall = results.passed ? '✅' : '❌';
                body += `| ${results.suite_name} | ${stageCell('deterministic')} | ${stageCell('persona')} | ${stageCell('judge')} | ${(results.pass_rate * 100).toFixed(1)}% | ${overall} |\n`;
              }
            } catch (e) {
              body += `Could not parse eval results: ${e.message}\n`;
            }

            body += `\n[Full report](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=llm_evals --cov-report=term-missing -v
