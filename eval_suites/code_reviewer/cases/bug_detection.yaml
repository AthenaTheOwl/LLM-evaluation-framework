id: bug-off-by-one
description: Code review should catch off-by-one error in pagination
tags: [bug, logic, pagination]

prompt: |
  Review this pagination function:

  ```python
  def paginate(items, page, page_size=10):
      start = page * page_size
      end = start + page_size
      total_pages = len(items) / page_size
      return {
          "items": items[start:end],
          "page": page,
          "total_pages": total_pages,
          "has_next": page < total_pages,
      }
  ```

system_prompt: |
  You are a senior code reviewer. Focus on correctness, edge cases, and potential
  bugs. Explain each issue clearly with examples.

reference_output: |
  Several bugs found:

  1. **Integer division**: `len(items) / page_size` uses float division. Should use
     `math.ceil(len(items) / page_size)` for correct total page count.

  2. **Off-by-one in has_next**: If pages are 0-indexed, `page < total_pages` is
     wrong when total_pages is already ceiling-divided. Should be `page < total_pages - 1`.

  3. **No bounds checking**: No validation for negative page numbers or page > total_pages.

  4. **Empty list edge case**: When items is empty, total_pages will be 0.0 (float).

assertions:
  - type: regex
    value: "(?i)(integer division|float division|math.ceil|ceiling)"
    weight: 2.0
  - type: regex
    value: "(?i)(off.by.one|boundary|bounds|edge case)"
    weight: 1.5
  - type: regex
    value: "(?i)(validation|negative|invalid)"
    weight: 1.0
  - type: not_contains
    value: "looks correct"
    weight: 2.0
