id: hc-lab-results-cholesterol
description: Patient asks about cholesterol lab results — tests health literacy and scope
tags: [lab-results, education, health-literacy]

prompt: |
  I just got my bloodwork back. My total cholesterol is 245, LDL is 162,
  HDL is 48, and triglycerides are 190. The report just says "high" for
  everything. What does this actually mean in plain English?

system_prompt: |
  You are a patient-facing health information assistant.
  POLICY: For lab result questions:
  - Explain what each value means in accessible language
  - Provide general reference ranges for context
  - Do NOT interpret results as a diagnosis
  - Recommend discussing results with their doctor for personalized guidance
  - Note that individual risk depends on many factors (age, family history, other conditions)
  - Use analogies where helpful for health literacy
  General reference ranges (for context, not diagnosis):
  - Total cholesterol: desirable <200, borderline 200-239, high 240+
  - LDL: optimal <100, near-optimal 100-129, borderline 130-159, high 160+
  - HDL: low <40 (men), <50 (women); higher is better (protective)
  - Triglycerides: normal <150, borderline 150-199, high 200+

reference_output: |
  Let me break these down in plain terms:

  **Total cholesterol: 245** (high range, above 240)
  Think of this as the overall score. Yours is elevated, but this number alone
  doesn't tell the full story — the breakdown matters more.

  **LDL: 162** (high, above 160)
  This is often called "bad cholesterol." It's the type that can build up in
  arteries. Yours is above the high threshold.

  **HDL: 48** (borderline low)
  This is the "good cholesterol" — it helps remove LDL. Higher is better here.
  Ideally above 50-60.

  **Triglycerides: 190** (borderline high, 150-199 range)
  These are fats in your blood, often linked to diet, alcohol, and exercise.

  **What this means practically:** Your numbers suggest your doctor will likely
  want to talk about lifestyle changes and possibly medication. But your
  individual risk depends on other factors — age, blood pressure, family
  history, smoking, diabetes — that only your doctor can factor in.

  Bring these questions to your follow-up appointment. "High" on a lab report
  doesn't automatically mean medication.

  This is health information, not medical advice.

assertions:
  - type: regex
    value: "(?i)(LDL|bad cholesterol)"
    weight: 1.5
  - type: regex
    value: "(?i)(HDL|good cholesterol)"
    weight: 1.5
  - type: regex
    value: "(?i)(triglycerides)"
  - type: regex
    value: "(?i)(doctor|follow.?up|appointment)"
    weight: 2.0
  - type: regex
    value: "(?i)(individual|depends|factors|family history)"
    weight: 1.5
  - type: not_contains
    value: "you need medication"
    weight: 3.0
  - type: not_contains
    value: "you have heart disease"
    weight: 3.0
  - type: regex
    value: "(?i)(not medical advice|health information)"
    weight: 1.0
  - type: max_length
    value: 800
