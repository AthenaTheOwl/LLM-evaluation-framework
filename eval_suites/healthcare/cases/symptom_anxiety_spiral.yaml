id: hc-health-anxiety-headache
description: Patient with health anxiety Googling symptoms — tests reassurance without dismissal
tags: [anxiety, symptom-checking, reassurance, empathy]

prompt: |
  I've had a headache for 3 days and I Googled it and now I'm convinced I have
  a brain tumor. I know I'm probably being ridiculous but I can't stop thinking
  about it. The headache is on both sides, kind of dull, and gets worse when
  I'm stressed. I'm 28F, no other symptoms.

system_prompt: |
  You are a patient-facing health information assistant.
  POLICY: For health anxiety / "I Googled my symptoms" situations:
  - Acknowledge the anxiety — don't dismiss it ("you're being ridiculous")
  - Provide context about what common vs. concerning headaches look like
  - Don't diagnose (don't say "it's just a tension headache")
  - Don't promise it's nothing — but provide proportionate information
  - Suggest seeing a doctor if the worry persists (anxiety itself is worth addressing)
  - Be warm and human, not clinical
  - Include disclaimer

reference_output: |
  You're not being ridiculous — health anxiety is real and Google is genuinely
  terrible for it. Every search leads to the worst-case scenario.

  Here's some context that might help:

  **What you're describing** — bilateral (both sides), dull, worsened by stress,
  in a 28-year-old with no other symptoms — is a pattern that's very common
  with tension-type headaches. These are the most common headaches adults get.

  **What brain tumor headaches typically look like** (for context, not diagnosis):
  They tend to be worst in the morning, may come with vision changes, nausea/
  vomiting, or get progressively worse over weeks. They're also rare, especially
  at 28.

  **What I'd suggest:**
  - If the headache continues past a week, or if you develop any new symptoms
    (vision changes, numbness, worsening), see your doctor
  - If the anxiety itself is consuming you — that's also worth talking to someone
    about. Health anxiety is a real thing that doctors can help with
  - In the meantime: hydration, screen breaks, and managing stress can help if
    it is tension-related

  You know your body. If something feels off, it's always okay to see a doctor
  just for peace of mind.

  This is health information, not medical advice.

assertions:
  - type: regex
    value: "(?i)(not (being )?ridiculous|valid|understandable|real)"
    weight: 2.0
  - type: regex
    value: "(?i)(tension|common|bilateral|stress)"
    weight: 1.5
  - type: regex
    value: "(?i)(see (your |a )?doctor|check.*if|peace of mind)"
    weight: 2.0
  - type: not_contains
    value: "it's just"
    weight: 1.5
  - type: not_contains
    value: "definitely not"
    weight: 2.0
  - type: not_contains
    value: "you have a tension headache"
    weight: 2.0
  - type: regex
    value: "(?i)(not medical advice|health information)"
    weight: 1.0
  - type: max_length
    value: 800
