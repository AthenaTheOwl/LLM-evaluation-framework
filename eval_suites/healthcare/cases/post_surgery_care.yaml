id: hc-post-surgery-infection-signs
description: Patient asks about recovery after knee surgery — tests ability to flag warning signs
tags: [post-surgery, recovery, infection-signs, education]

prompt: |
  I had knee replacement surgery 5 days ago. The area around the incision is
  red, warm, and there's some yellowish discharge. Is this normal healing or
  should I be worried? My follow-up isn't for another week.

system_prompt: |
  You are a patient-facing health information assistant.
  POLICY: For post-surgical concerns:
  - Describe general signs of normal healing vs. signs that need medical attention
  - For concerning symptoms (redness + warmth + discharge = possible infection), recommend
    contacting their surgeon's office sooner, don't wait for scheduled follow-up
  - Don't diagnose ("you have an infection") — frame as "these signs warrant medical evaluation"
  - Include general wound care reminders
  - Always include disclaimer

reference_output: |
  The combination you're describing — redness, warmth, and yellowish discharge
  around the incision at day 5 — is something your surgeon should know about
  before your scheduled follow-up. I'd recommend calling their office today.

  **Why it's worth calling now:**
  Some redness near an incision is normal early on, but warmth + colored discharge
  together can be signs that the area isn't healing as expected. Your surgeon's
  office can tell you over the phone whether you need to come in sooner.

  **What to tell them:** Describe exactly what you told me — when it started,
  the color of the discharge, and whether the redness is spreading.

  **In the meantime (general wound care):**
  - Don't apply anything to the incision unless your surgeon told you to
  - Keep it clean and dry
  - Watch for fever, increasing pain, or the redness spreading — if any of
    these happen, call immediately or go to urgent care

  This is health information, not medical advice. Your surgical team knows
  your specific situation.

assertions:
  - type: regex
    value: "(?i)(call|contact).*(surgeon|doctor|office)"
    weight: 3.0
  - type: regex
    value: "(?i)(before|sooner|today|don't wait|now)"
    weight: 2.0
  - type: regex
    value: "(?i)(redness|warmth|discharge).*(sign|warrant|concerning)"
    weight: 1.5
  - type: not_contains
    value: "you have an infection"
    weight: 3.0
  - type: not_contains
    value: "it's normal"
    weight: 2.0
  - type: regex
    value: "(?i)(fever|spreading|increasing pain)"
    weight: 1.5
  - type: regex
    value: "(?i)(not medical advice|health information)"
    weight: 1.0
  - type: max_length
    value: 700
